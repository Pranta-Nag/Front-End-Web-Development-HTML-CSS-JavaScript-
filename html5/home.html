<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 5</title>

    <style type="text/css">
        header {
            background-color: #f0f0f0;
            padding: 1em;
            text-align: center;
            height: 50%;
        }
        h1 {
            color: #333;
            font-family: Arial, sans-serif;
        }
        section {
            margin: 20px;
            padding: 20px;
            background-color: #e0e0e0;
          
        }
        footer {
            background-color: #f0f0f0;
            padding: 1em;
            text-align: center;
            height: 50%;
        }
        p {
            color: #333;
            font-family: Arial, sans-serif;
        }
        aside {
            background-color: #ed7676;
            padding: 10px;
            margin-bottom: 20px;
            text-align: center;
            
        }
        figure {
            background-color: #76ed7c;
            padding: 10px;
            margin-bottom: 20px;
            text-align: center;
            
        }
        .div_1 {
            display: flex;
            justify-content: space-between;
            height: 50%;
            color: burlywood;
        }
        .div_2 {
            display: flex;
            justify-content:center;
            color: burlywood;
            width: 100%;
            height: 50%;
        }
    </style>

</head>
<body>
    
    <header>
        <h1>My HTML 5 Page</h1>
    </header>

    <section>
        <div class="div_1">
            <aside>
                <p>This is an aside element.</p>
            </aside>

            <figure>
               <p>This is a figure element.</p>
            </figure>

        </div class="div_1">

        <div class="div_2">
            <aside>
                <iframe src="https://www.youtube.com/embed/QoV6sG6mC9g" title="মাথা গরম করে ব্যবসা করলে যা ঘটে !!" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen width="500px" height="400px"></iframe>
            </aside>

            <figure>
               <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d471707.4003560618!2d91.33991558166707!3d22.53365251223465!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3753326935c8d8d7%3A0x70bd477f8c70e0b1!2sSitakund%20Upazila!5e0!3m2!1sen!2sbd!4v1777480080471!5m2!1sen!2sbd" width="500px" height="400px" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </figure>
        </div class="div_2">

        <h2>Welcome to My HTML 5 Page</h2>
        <p>This is a simple example of an HTML 5 page.</p>

        

    </section>

    <footer>
        <p>&copy; 2023 My HTML 5 Page. All rights reserved.</p>
    </footer>

</body>
</html>
