<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <fieldset style="width: fit-content; border: 2px solid black; padding: 20px;">
    <legend style="font-size: larger; font-weight: bold;">Registration Form</legend>
    <form action="" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter the name"/><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter the email"/><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter the password"/><br><br>
        <label for="gender">Gender:</label></br>
        <input type="radio" id="male" name="gender" value="male"/><label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female"/><label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="other"/><label for="other">Other</label><br><br>
        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="">--Select a country--</option>
            <option value="usa">USA</option>
            <option value="canada">Canada</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
            <option value="bangladesh">Bangladesh</option>
        </select><br><br>
        <label for="course">Course:</label><br/>
        <input type="checkbox" id="course1" name="course" value="course1"/><label for="course1">Course 1</label><br>
        <input type="checkbox" id="course2" name="course" value="course2"/><label for="course2">Course 2</label><br>
        <input type="checkbox" id="course3" name="course" value="course3"/><label for="course3">Course 3</label><br><br>
        <label for="phone">Phone:</label>
        <input type="tel" pattern="[0-9]" id="phone" name="phone" placeholder="Enter the phone"/><br><br>
        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="Enter the message"></textarea><br><br>


        <label for="image">Image:</label>
        <input type="file" accept=".jpg, .jpeg, .png" id="image" name="image"/><br><br>
        <label>
        
        <label for="web dev">Web Development</label> <br/>
        <select name="font_end" id="font_end">
            <optgroup label="Front-end Development">   
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
            <option value="react">React</option>
            </optgroup>
        </select>
        <select name="back_end" id="back_end">
            <optgroup label="Back-end Development">
            <option value="node">Node.js</option>
            <option value="mongo">MongoDB</option>
            <option value="php">PHP</option>
            <option value="laravel">Laravel</option>
        </optgroup>
        </select>
        </label>
        <br><br>
        
    <button type="submit">Submit</button>
    
    </form>
    </fieldset>

</body>
</html>
