<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn CSS with HTML using background images</title>

    <style>
        .main {
            width: 1000px;
            height: 400px;
            background-image: url('2.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            font-size: 20px;
            text-shadow: 3px 3px 5px black;
            text-align:center;
            box-shadow: 4px 4px 10px red;
        }
          .main1 {
            width: 1000px;
            height: 500px;
            color: white;
            background-color: cornsilk;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="main">
        <h2>Background Image Example</h2>
        <p>Nature is all around us—trees, water, air, and land. It gives us food, shelter, and fresh air to breathe. Flowers, birds, and animals make nature beautiful. We must keep nature clean and safe. Throw waste in dustbins, not on the road.</p>
    </div>
    <div class="main1"> </div>
</body>
</html>
