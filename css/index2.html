<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice CSS</title>
    <style>
        .main{
            width: 900px;
            height: 150px;
            background-color: violet;
        }
        .row1{
            width: 900px;
            height: 50px;
        }
        .row2{
            width: 900px;
            height: 50px;
        }
        .row1c1{
            width: 200px;
            height: 50px;
            background-color: lightgreen;
            float: left;
        }
        .row1c2{
            width: 300px;
            height: 50px;
            background-color: lightcoral;
            float: left;
        }
        .row1c3{
            width: 400px;
            height: 50px;
            background-color: lightblue;
            float: right;
        }
        .row3{
            width: 900px;
            height: 50px;
        }
        .row3c1{
            width: 400px;
            height: 50px;
            background-color: lightyellow;
            float: left;
        }
        .row3c2{
            width: 500px;
            height: 50px;
            background-color: lightpink;
            float: right;
        }
    </style>

</head>
<body>
    <div class="main">
        <div class="row1">
            <div class="row1c1">
                Home
            </div>
            <div class="row1c2">
                About
            </div>
            <div class="row1c3">
                Courses
            </div>
        </div>
        <div class="row2">
                Welcome to our website!
        </div>
        <div class="row3">
            <div class="row3c1">
                Contact Us
            </div>
            <div class="row3c2">
                Privacy Policy
            </div>
        </div>
    </div>
</body>
</html>
